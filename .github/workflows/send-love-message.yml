name: 情侣每日消息推送
on:
  schedule:
    - cron: '0 1 * * *'  # 北京时间 09:00 对应 UTC 01:00
  workflow_dispatch: # 保留手动触发，方便调试
jobs:
  send-message:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 新增超时保护，防止任务卡死
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 新增pip缓存，加快依赖安装速度
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests lunardate
      
      - name: 执行消息推送
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          GIRL_OPENID: ${{ secrets.GIRL_OPENID }}
          MY_OPENID: ${{ secrets.MY_OPENID }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
          CITY_ADCODE: ${{ secrets.CITY_ADCODE }}
        run: python main.py
