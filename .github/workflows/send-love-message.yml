name: 情侣每日消息推送
on:
  schedule:
   - cron: '*/3 * * * *'  # 测试用：每3分钟触发（正式用请改为 0 0 * * * 即北京时间8点）
  workflow_dispatch:  # 手动触发开关

jobs:
  send-message:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests lunardate pytz  # 新增pytz依赖（时区处理）

      - name: 执行消息推送
        env:
          # 从GitHub Secrets读取配置（名称必须和Secrets一致）
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          GIRL_OPENID: ${{ secrets.GIRL_OPENID }}
          MY_OPENID: ${{ secrets.MY_OPENID }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
          CITY_ADCODE: ${{ secrets.CITY_ADCODE }}
        run: python main.py
