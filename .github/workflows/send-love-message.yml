name: 情侣每日消息推送

on:
  schedule:
    - cron: '0 1 * * *' # 北京时间 09:00 触发 (UTC 01:00)
  workflow_dispatch: # 允许手动触发

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests lunardate apscheduler

      - name: 执行消息推送
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          GIRL_OPENID: ${{ secrets.GIRL_OPENID }}
          MY_OPENID: ${{ secrets.MY_OPENID }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
          CITY_ADCODE: ${{ secrets.CITY_ADCODE }}
        run: python main.py
