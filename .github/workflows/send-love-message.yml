name: 情侣每日消息推送
on:
  schedule:
    - cron: '30 0 * * *'  # （UTC 0 点 30 分 = 北京时间 8 点 30 分
  workflow_dispatch:    # 保留手动触发开关

jobs:
  send-message:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 解决Git认证问题

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests lunardate pytz

      - name: 执行消息推送
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
          GIRL_OPENID: ${{ secrets.GIRL_OPENID }}
          MY_OPENID: ${{ secrets.MY_OPENID }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
          CITY_ADCODE: ${{ secrets.CITY_ADCODE }}
        run: python main.py
